server {
    listen 80;
    server_name tap2buy.lk www.tap2buy.lk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tap2buy.lk www.tap2buy.lk;

    ssl_certificate /etc/ssl/tap2buy/cert.pem;
    ssl_certificate_key /etc/ssl/tap2buy/key.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # --- API (port 4000) ---
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        client_max_body_size 5M;
    }

    # --- Landing page (port 3000) ---
    # Root page
    location = / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Landing page assets (assetPrefix: /_lp)
    location /_lp/ {
        proxy_pass http://127.0.0.1:3000;
        rewrite ^/_lp(/.*)$ $1 break;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Landing page static files
    location = /og-image.png { proxy_pass http://127.0.0.1:3000; }
    location = /sitemap.xml { proxy_pass http://127.0.0.1:3000; }
    location = /robots.txt { proxy_pass http://127.0.0.1:3000; }
    location = /favicon.ico { proxy_pass http://127.0.0.1:3000; }
    location = /favicon-16x16.png { proxy_pass http://127.0.0.1:3000; }
    location = /favicon-32x32.png { proxy_pass http://127.0.0.1:3000; }
    location = /apple-touch-icon.png { proxy_pass http://127.0.0.1:3000; }
    location = /icon-512.png { proxy_pass http://127.0.0.1:3000; }

    # --- Web app (port 3001) ---
    # Auth, dashboard, confirm pages
    location ~ ^/(auth|dashboard|confirm)(/|$) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Web app _next assets
    location /_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → storefront (web app handles /[store] routes)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
